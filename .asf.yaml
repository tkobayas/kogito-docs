github:
  description: Apache KIE SonataFlow documentation repository
  homepage: https://kie.apache.org
  labels:
    - apache
    - java
    - workflow
    - workflow-engine
    - spring-boot
    - quarkus
    - kogito
    - knative
    - cloud-native
    - cloudevents
    - kubernetes
    - hacktoberfest
    - persistence
    - data-index
    - jobs-service
  ghp_branch: gh-pages
  ghp_path: /
  features:
    issues: true
  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
